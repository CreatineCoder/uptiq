# Config for NQ 10 Pilot
experiment:
  name: "nq_10_pilot"
  seed: 42
  description: "Benchmarking 10 queries from the Natural Questions (NQ) dataset."

dataset:
  path: "data/processed/benchmark_dataset.jsonl"
  total_queries: 10
  filter_dataset: "nq"

vector_store:
  persist_directory: "data/corpus/chroma_db"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  top_k: 5

agents:
  naive_rag:
    enabled: true
    model: "gpt-4o-mini"
    temperature: 0.0
  corrective_rag:
    enabled: true
    model: "gpt-4o-mini"
    temperature: 0.0
    max_rewrite_retries: 2
    max_hallucination_retries: 1
    min_relevant_docs: 2
    tavily_api_key: "${TAVILY_API_KEY}"

evaluation:
  quantitative:
    enabled: true
    metrics: ["exact_match", "f1", "recall_at_5", "mrr"]
  ragas:
    enabled: true
    metrics: ["faithfulness", "answer_relevancy", "context_precision", "context_recall"]
  llm_judge:
    enabled: true
    model: "gpt-4o-mini"
    sample_size: 50
    criteria: ["correctness", "completeness", "reasoning_quality"]

output:
  results_dir: "data/results/nq_10"
  checkpoint_interval: 5
