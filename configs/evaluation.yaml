# ============================================================
# Evaluation-Specific Configuration
# ============================================================
# Controls which evaluation methods run and their parameters.
# This is loaded alongside default.yaml for evaluate-only mode.

evaluation:
  quantitative:
    enabled: true
    metrics:
      - exact_match
      - f1
      - recall_at_5
      - mrr

  ragas:
    enabled: true
    metrics:
      - faithfulness
      - answer_relevancy
      - context_precision
      - context_recall

  llm_judge:
    enabled: true
    model: "gpt-4o"
    temperature: 0.0
    sample_size: 200          # 100 NQ + 100 HotpotQA (stratified)
    criteria:
      - correctness
      - completeness
      - reasoning_quality
